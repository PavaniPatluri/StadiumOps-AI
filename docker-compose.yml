version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: stadiumops_db
    environment:
      POSTGRES_USER: stadiumops
      POSTGRES_PASSWORD: stadiumops
      POSTGRES_DB: stadiumops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stadiumops"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stadiumops_backend
    environment:
      DATABASE_URL: postgresql://stadiumops:stadiumops@db:5432/stadiumops
      SECRET_KEY: stadiumops-secret-key-change-in-prod
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python app/db/seed.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stadiumops_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
